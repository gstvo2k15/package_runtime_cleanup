---
- name: Find setenv.sh files under data
  ansible.builtin.find:
    paths: "{{ mdw_setenv_search_root }}"
    patterns: setenv.sh
    file_type: file
    recurse: true
  register: mdw_setenv_files

- name: Fail if no setenv.sh was found
  ansible.builtin.fail:
    msg: "No setenv.sh found under {{ mdw_setenv_search_root }}"
  when: mdw_setenv_files.matched | int == 0

- name: Grep HOME values from setenv.sh files
  ansible.builtin.shell: |
    set -o pipefail
    grep -H -E '^[[:space:]]*(export[[:space:]]+)?(JAVA_HOME|CATALINA_HOME)=' {{ mdw_setenv_files.files | map(attribute='path') | map('quote') | join(' ') }}
  args:
    executable: /bin/bash
  register: mdw_setenv_home_grep
  changed_when: false

- name: Show grep output from setenv.sh files
  ansible.builtin.debug:
    var: mdw_setenv_home_grep.stdout_lines

- name: Extract runtime paths from grep output
  ansible.builtin.set_fact:
    mdw_runtime_paths: >-
      {{
        mdw_setenv_home_grep.stdout
        | regex_findall('(?:JAVA_HOME|CATALINA_HOME)=\"?([^\"\\n]+)\"?')
        | unique
      }}

- name: Show runtime paths detected from setenv.sh
  ansible.builtin.debug:
    var: mdw_runtime_paths

- name: Build required RPM names from setenv.sh runtime paths
  ansible.builtin.set_fact:
    mdw_required_rpms: >-
      {{
        (
          mdw_required_rpms | default([])
          +
          (
            [
              'mdw-jdk' ~
              (
                item
                | regex_search('jdk([0-9]+)_current$', '\1')
                | first
              )
            ]
            if item is regex('.*/jdk[0-9]+_current$')
            else
            (
              [
                'mdw-' ~
                (
                  item
                  | regex_search('/apps/install/(asf|jws)-tomcat([0-9]+)/current$', '\1-tomcat\2')
                  | first
                )
              ]
              if item is regex('^/apps/install/(asf|jws)-tomcat[0-9]+/current$')
              else []
            )
          )
        ) | unique
      }}
  loop: "{{ mdw_runtime_paths | default([]) }}"

- name: Show candidate RPMs to install from setenv.sh
  ansible.builtin.debug:
    var: mdw_required_rpms

- name: Get running Java and Tomcat processes
  ansible.builtin.shell: |
    set -o pipefail
    ps auxf | egrep '[j]ava|[t]omcat|[c]atalina' || true
  args:
    executable: /bin/bash
  register: mdw_runtime_ps
  changed_when: false

- name: Show running Java and Tomcat processes
  ansible.builtin.debug:
    var: mdw_runtime_ps.stdout_lines

- name: Build RPM names from running processes
  ansible.builtin.set_fact:
    mdw_running_rpms: >-
      {{
        (
          mdw_running_rpms | default([])
          +
          (
            [
              'mdw-jdk' ~
              (
                item
                | regex_search('/apps/install/java/jdk([0-9]+)_current/', '\1')
                | first
              )
            ]
            if item is regex('/apps/install/java/jdk[0-9]+_current/')
            else []
          )
          +
          (
            [
              'mdw-' ~
              (
                item
                | regex_search('/apps/install/(asf|jws)-tomcat([0-9]+)/current/', '\1-tomcat\2')
                | first
              )
            ]
            if item is regex('/apps/install/(asf|jws)-tomcat[0-9]+/current/')
            else []
          )
        ) | unique
      }}
  loop: "{{ mdw_runtime_ps.stdout_lines | default([]) }}"

- name: Show RPMs detected from running processes
  ansible.builtin.debug:
    var: mdw_running_rpms

- name: Build protected RPM list from setenv.sh and running processes
  ansible.builtin.set_fact:
    mdw_protected_rpms: >-
      {{
        (
          mdw_required_rpms | default([])
          +
          mdw_running_rpms | default([])
        ) | unique
      }}

- name: Show protected RPMs
  ansible.builtin.debug:
    var: mdw_protected_rpms

- name: Get installed mdw runtime RPM package names
  ansible.builtin.shell: |
    set -o pipefail
    rpm -qa --qf '%{NAME}\n' | sort -u | egrep '{{ mdw_runtime_rpm_query_patterns | join("|") }}' || true
  args:
    executable: /bin/bash
  register: mdw_installed_runtime_rpms
  changed_when: false

- name: Show installed mdw runtime RPM package names
  ansible.builtin.debug:
    var: mdw_installed_runtime_rpms.stdout_lines

- name: Determine candidate RPMs to remove
  ansible.builtin.set_fact:
    mdw_rpms_to_remove: >-
      {{
        mdw_installed_runtime_rpms.stdout_lines
        | difference(mdw_protected_rpms | default([]))
        | list
      }}

- name: Show candidate RPMs to remove
  ansible.builtin.debug:
    var: mdw_rpms_to_remove

- name: Remove unused mdw runtime RPMs
  ansible.builtin.dnf:
    name: "{{ mdw_rpms_to_remove }}"
    state: absent
  when: mdw_rpms_to_remove | length > 0

- name: Install required mdw runtime RPMs from setenv.sh
  ansible.builtin.dnf:
    name: "{{ mdw_required_rpms }}"
    state: present
  when: mdw_required_rpms | length > 0